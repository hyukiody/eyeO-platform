name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

jobs:
  # ==========================================
  # Backend: Build all Java modules via parent POM
  # ==========================================
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build all modules
        run: mvn -B clean compile -DskipTests

      - name: Run tests (data-core)
        run: mvn -pl data-core -DskipTests=false test
        continue-on-error: true

      - name: Run tests (identity-service)
        run: mvn -pl identity-service -DskipTests=false test
        continue-on-error: true

      - name: Run tests (stream-processing)
        run: mvn -pl stream-processing -DskipTests=false test
        continue-on-error: true

      - name: Run tests (edge-node)
        run: mvn -pl edge-node -DskipTests=false test
        continue-on-error: true

      - name: Run tests (middleware)
        run: mvn -pl middleware -DskipTests=false test
        continue-on-error: true

  # ==========================================
  # Frontend: Build & Test React/Vite app
  # ==========================================
  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: frontend
        run: npm run test:ci

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NODE_ENV: production

  # ==========================================
  # Docker: Build images (on main branch only)
  # ==========================================
  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build Java artifacts
        run: mvn -B clean package -DskipTests

      - name: Build Docker images
        run: docker compose -f docker-compose.yml build
