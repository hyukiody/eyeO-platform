# Edge Node Configuration
server.port=8080
spring.application.name=yo3-edge-node

# Microkernel Integration (Zero-Trust Architecture)
microkernel.url=${MICROKERNEL_URL:http://localhost:9090}
microkernel.timeout=5000

# Video Processing
video.fps=30
video.throttle.ms=500
video.buffer.size=10485760

# YOLO Detection
yolo.model.path=/models/yolov8n.pt
yolo.confidence.threshold=0.5
yolo.nms.threshold=0.4

# Device Authentication
device.token=${DEVICE_TOKEN:default-dev-token}

# CORS (allow frontend)
cors.allowed.origins=http://localhost:5173,http://localhost:80
